        </nav>
      </header>

      <main class="page">
        <section class="import-card managers-card" aria-labelledby="managers-title">
          <h1 id="managers-title">ЖУРНАЛ МЕНЕДЖЕРОВ</h1>

          <form class="manager-form">
            <p class="manager-form-title">Добавить нового менеджера</p>

            <div class="manager-form-row">
              <label class="manager-field manager-field-email">
                <span>Email</span>
                <input type="email" aria-label="Email" autocomplete="off" spellcheck="false" autocorrect="off"
                  autocapitalize="off">
              </label>

              <label class="manager-field manager-field-prefix">
                <span>Префикс</span>
                <input type="text" aria-label="Префикс" autocomplete="off" spellcheck="false" autocorrect="off"
                  autocapitalize="off">
              </label>

              <button class="manager-add-btn" type="button" aria-label="Добавить менеджера"></button>
            </div>
          </form>

          <table class="managers-table">
            <thead>
              <tr>
                <th scope="col">№</th>
                <th scope="col">Id</th>
                <th scope="col">EMAIL ПОЧТА</th>
                <th scope="col">ПРЕФИКС</th>
              </tr>
            </thead>

            <tbody>
              <tr>
                <td>1</td>
                <td>23</td>
                <td>111nat@mail.ru</td>
                <td>CB0</td>
              </tr>
            </tbody>
          </table>

          <button class="manager-remove-btn" type="button" aria-label="Удалить менеджера"></button>
          <div class="manager-select" data-manager-select>
            <button class="manager-select-btn" type="button" aria-haspopup="listbox" aria-expanded="false"
              aria-controls="manager-select-menu">
              <span class="manager-select-value">Выбрать менеджера</span>
              <span class="manager-select-chevron" aria-hidden="true"></span>
            </button>

            <button class="manager-select-clear" type="button" aria-label="Очистить выбор" hidden></button>

            <ul class="manager-select-menu" id="manager-select-menu" role="listbox" hidden>
              <li role="option" data-value="Z" aria-selected="false">Z</li>
              <li role="option" data-value="Бус" aria-selected="false">Бус</li>
              <li role="option" data-value="Кас" aria-selected="false">Кас</li>
              <li role="option" data-value="Н" aria-selected="false">Н</li>
              <li role="option" data-value="Ом" aria-selected="false">Ом</li>
              <li role="option" data-value="П" aria-selected="false">П</li>
              <li role="option" data-value="Св" aria-selected="false">Св</li>
              <li role="option" data-value="Ю" aria-selected="false">Ю</li>
            </ul>
          </div>
        </section>

        <div class="bottom-strip" aria-hidden="true"></div>
      </main>
    </div>
  </div>

  <script src="script.js?v=remarks-fix-4"></script>
